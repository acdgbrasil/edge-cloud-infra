name: Smoke Test — Post-Deploy Health Checks

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - hml
      mode:
        description: 'Check mode'
        required: true
        default: 'http'
        type: choice
        options:
          - http
          - kubectl
  push:
    branches: [main]
    paths:
      - 'apps/**'

permissions:
  contents: read
  id-token: write

jobs:
  # ---- HTTP health checks (external, works without OIDC) ----
  http-check:
    name: HTTP Health — ${{ matrix.service }}
    if: ${{ github.event.inputs.mode != 'kubectl' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: social-care
            url_prod: https://social-care.acdgbrasil.com.br/health
            url_hml: https://social-care-hml.acdgbrasil.com.br/health
          - service: people-context
            url_prod: https://people.acdgbrasil.com.br/health
            url_hml: https://people-hml.acdgbrasil.com.br/health
          - service: conecta-web
            url_prod: https://conecta.acdgbrasil.com.br/health/live
            url_hml: https://conecta-hml.acdgbrasil.com.br/health/live
          - service: auth (zitadel)
            url_prod: https://auth.acdgbrasil.com.br/healthz
            url_hml: https://auth.acdgbrasil.com.br/healthz

    steps:
      - name: Wait for Flux reconciliation
        run: sleep 90

      - name: Determine URL
        id: url
        run: |
          ENV="${{ github.event.inputs.environment || 'prod' }}"
          if [[ "$ENV" == "hml" ]]; then
            echo "target=${{ matrix.url_hml }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=${{ matrix.url_prod }}" >> "$GITHUB_OUTPUT"
          fi
          echo "env=$ENV" >> "$GITHUB_OUTPUT"

      - name: Health check — ${{ matrix.service }}
        run: |
          URL="${{ steps.url.outputs.target }}"
          echo "Checking: $URL"

          MAX_RETRIES=5
          RETRY_DELAY=30

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 30 "$URL" || echo "000")

            if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
              echo "✓ ${{ matrix.service }} is healthy (HTTP $HTTP_CODE)"
              exit 0
            fi

            echo "Attempt $i/$MAX_RETRIES: HTTP $HTTP_CODE — retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

          echo "::error::${{ matrix.service }} failed health check after $MAX_RETRIES attempts (last HTTP $HTTP_CODE)"
          exit 1

  # ---- Kubectl deep check (requires OIDC setup on K3s) ----
  kubectl-check:
    name: Kubectl Deep Check
    if: ${{ github.event.inputs.mode == 'kubectl' }}
    runs-on: ubuntu-latest

    env:
      K3S_API_SERVER: https://100.77.46.69:6443

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Get OIDC token
        id: oidc
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const token = await core.getIDToken('sts.amazonaws.com');
            core.setOutput('token', token);

      - name: Configure kubectl with OIDC
        run: |
          kubectl config set-cluster k3s \
            --server="${K3S_API_SERVER}" \
            --insecure-skip-tls-verify=true

          kubectl config set-credentials github-oidc \
            --token="${{ steps.oidc.outputs.token }}"

          kubectl config set-context github \
            --cluster=k3s \
            --user=github-oidc

          kubectl config use-context github

      - name: Verify cluster access
        run: kubectl get namespaces

      - name: Check deployments
        run: |
          echo "## Deployment Status" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          kubectl get deployments -o wide >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          kubectl get deployments -o wide

      - name: Check pods health
        run: |
          echo ""
          echo "== All Pods =="
          kubectl get pods -o wide

          echo ""
          echo "== Pods NOT Running =="
          NOT_RUNNING=$(kubectl get pods --field-selector=status.phase!=Running,status.phase!=Succeeded -o name 2>/dev/null || true)

          if [[ -n "$NOT_RUNNING" ]]; then
            echo "::warning::Found pods not in Running state:"
            echo "$NOT_RUNNING"

            echo "## ⚠️ Pods Not Running" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$NOT_RUNNING" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All pods are Running or Succeeded."
            echo "## ✅ All pods healthy" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check recent pod restarts
        run: |
          echo ""
          echo "== Pods with restarts =="
          kubectl get pods -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{range .status.containerStatuses[*]}{.restartCount}{"\t"}{end}{"\n"}{end}' \
            | awk -F'\t' '$2 > 0 {print $1 " restarts=" $2}'

      - name: Check Flux reconciliation status
        run: |
          echo ""
          echo "== Flux Kustomizations =="
          kubectl get kustomizations -A 2>/dev/null || echo "No Flux kustomizations found"

          echo ""
          echo "== Flux HelmReleases =="
          kubectl get helmreleases -A 2>/dev/null || echo "No HelmReleases found"

      - name: Check resource usage
        run: |
          echo ""
          echo "== Node Resources =="
          kubectl top nodes 2>/dev/null || echo "Metrics server not available"

          echo ""
          echo "== Pod Resources =="
          kubectl top pods 2>/dev/null || echo "Metrics server not available"

  # ---- Summary ----
  summary:
    name: Deploy Summary
    needs: [http-check, kubectl-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish summary
        run: |
          MODE="${{ github.event.inputs.mode || 'http' }}"
          {
            echo "## Smoke Test Results"
            echo ""
            echo "- **Mode:** ${MODE}"
            echo "- **Environment:** ${{ github.event.inputs.environment || 'prod' }}"
            echo "- **Triggered by:** ${{ github.event_name }}"
            echo ""

            if [[ "$MODE" == "kubectl" ]]; then
              if [[ "${{ needs.kubectl-check.result }}" == "success" ]]; then
                echo "✅ Cluster check passed"
              else
                echo "❌ Cluster check failed — review logs"
              fi
            else
              if [[ "${{ needs.http-check.result }}" == "success" ]]; then
                echo "✅ All services healthy"
              else
                echo "❌ Some services failed — review logs"
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
