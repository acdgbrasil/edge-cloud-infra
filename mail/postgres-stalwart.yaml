# -----------------------------------------------------------
# PostgreSQL dedicado para o Stalwart (Mail Server)
# Isolamento database-per-service: após esta migração,
# o postgres compartilhado vira exclusivo do social-care.
#
# PRÉ-REQUISITO MANUAL:
#   Criar secret no Bitwarden SM com a senha do novo postgres
#   e substituir o bwSecretId abaixo.
# -----------------------------------------------------------

---
# 1. BitwardenSecret — Credenciais do PostgreSQL Stalwart
# Substitui o secret manual stalwart-db-credentials
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: stalwart-db-bitwardensecret
  namespace: mail
spec:
  organizationId: "d00e0ecf-235b-4168-8367-b35e00dbf84d"
  secretName: stalwart-db-credentials
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: "7baf6d63-f29b-4795-92b4-b40f01134f43"
      secretKeyName: password

---
# 2. StatefulSet — PostgreSQL Stalwart
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-stalwart
  namespace: mail
spec:
  serviceName: "postgres-stalwart"
  replicas: 1
  selector:
    matchLabels:
      app: postgres-stalwart
  template:
    metadata:
      labels:
        app: postgres-stalwart
    spec:
      nodeSelector:
        hardware-type: high-performance
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stalwart-db-credentials
              key: password
        - name: POSTGRES_USER
          value: stalwart
        - name: POSTGRES_DB
          value: stalwart
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        volumeMounts:
        - name: postgres-stalwart-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-stalwart-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi

---
# 3. Service — PostgreSQL Stalwart
apiVersion: v1
kind: Service
metadata:
  name: postgres-stalwart
  namespace: mail
spec:
  selector:
    app: postgres-stalwart
  ports:
  - port: 5432
    targetPort: 5432
