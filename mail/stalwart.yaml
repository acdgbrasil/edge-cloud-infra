# -----------------------------------------------------------
# Stalwart Mail Server — All-in-one (SMTP, IMAP, JMAP, Web)
# Substitui Mailu (7 pods) por 1 único pod.
# Domínio: acdgbrasil.com.br
# Hostname: mail.acdgbrasil.com.br
# Relay: Resend.com (porta 465, TLS implícito)
# -----------------------------------------------------------
#
# PRÉ-REQUISITOS (manuais, antes do deploy):
#
#   1. Criar o database no PostgreSQL:
#      kubectl exec -it postgres-0 -- psql -U postgres -c "CREATE DATABASE stalwart;"
#      kubectl exec -it postgres-0 -- psql -U postgres -c "CREATE USER stalwart WITH PASSWORD '<SENHA>';"
#      kubectl exec -it postgres-0 -- psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE stalwart TO stalwart;"
#      kubectl exec -it postgres-0 -- psql -U postgres -c "ALTER DATABASE stalwart OWNER TO stalwart;"
#
#   2. Criar secret com a senha do banco:
#      kubectl create secret generic stalwart-db-credentials -n mail \
#        --from-literal=password='<MESMA-SENHA>'
#
#   3. Criar secret com a API key do Resend:
#      (Reusar o resend-credentials que já existe via BitwardenSecret)
#
#   4. Criar secret com senha do admin:
#      kubectl create secret generic stalwart-admin-credentials -n mail \
#        --from-literal=admin-password='<SENHA-ADMIN>'
#
#   5. TLS: CronJob acme-cert-renew gera cert Let's Encrypt via DNS-01 + Cloudflare.
#      Requer: secret stalwart-cf-credentials com API token Cloudflare (zona noticetable.com).
#      CNAME na Umbler: _acme-challenge.mail → _acme-challenge.mail.noticetable.com
#      O CronJob cria/atualiza o secret stalwart-tls-cert automaticamente.
#
#   6. Garantir diretório no Xeon:
#      sudo mkdir -p /var/lib/stalwart
#      sudo chmod 755 /var/lib/stalwart
#
# -----------------------------------------------------------

# ==========================================================
# ConfigMap — config.toml do Stalwart
# ==========================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-config
  namespace: mail
data:
  config.toml: |
    [server]
    hostname = "mail.acdgbrasil.com.br"
    max-connections = 1024
    allowed-ips = ["10.42.0.0/16", "10.43.0.0/16", "127.0.0.0/8"]

    # --- Listeners ---
    [server.listener."smtp"]
    bind = ["[::]:25"]
    protocol = "smtp"

    [server.listener."submissions"]
    bind = ["[::]:465"]
    protocol = "smtp"
    tls.implicit = true

    [server.listener."submission"]
    bind = ["[::]:587"]
    protocol = "smtp"

    [server.listener."imap"]
    bind = ["[::]:143"]
    protocol = "imap"

    [server.listener."imaps"]
    bind = ["[::]:993"]
    protocol = "imap"
    tls.implicit = true

    [server.listener."http"]
    bind = ["[::]:8080"]
    protocol = "http"

    # --- TLS (cert gerenciado pelo CronJob acme-cert-renew) ---
    # Cert Let's Encrypt via acme.sh DNS-01 + Cloudflare (CNAME delegation)
    # O CronJob renova o cert e atualiza o secret stalwart-tls-cert
    [certificate."default"]
    cert = "%{file:/opt/stalwart/etc/tls/tls.crt}%"
    private-key = "%{file:/opt/stalwart/etc/tls/tls.key}%"
    default = true

    # --- Storage (PostgreSQL) ---
    [store."postgresql"]
    type = "postgresql"
    host = "postgres-stalwart.mail.svc.cluster.local"
    port = 5432
    database = "stalwart"
    user = "stalwart"
    password = "%{env:DB_PASSWORD}%"
    timeout = "15s"

    [store."postgresql".tls]
    enable = false

    [store."postgresql".pool]
    max-connections = 10

    # --- Directory (user management via PostgreSQL) ---
    [directory."internal"]
    type = "internal"
    store = "postgresql"

    [storage]
    data = "postgresql"
    blob = "postgresql"
    fts = "postgresql"
    lookup = "postgresql"
    directory = "internal"

    # --- Admin fallback ---
    [authentication.fallback-admin]
    user = "admin"
    secret = "%{env:ADMIN_PASSWORD}%"

    # --- DKIM ---
    [signature."dkim"]
    algorithm = "rsa-sha256"
    domain = "acdgbrasil.com.br"
    selector = "default"
    private-key = "%{file:/opt/stalwart/etc/dkim/dkim-private.pem}%"
    headers = ["From", "To", "Date", "Subject", "Message-ID"]
    set = true

    # --- SMTP Relay via Resend (porta 25 outbound bloqueada pelo datacenter) ---
    [queue.outbound.next-hop]
    if = "true"
    then = "relay"

    [remote."relay"]
    address = "smtp.resend.com"
    port = 587
    protocol = "smtp"

    [remote."relay".tls]
    implicit = false
    starttls = true

    [remote."relay".auth]
    username = "resend"
    secret = "%{env:RESEND_SMTP_KEY}%"

# ==========================================================
# CronJob — Renovação automática do cert TLS via acme.sh
# Usa DNS-01 com Cloudflare (CNAME delegation noticetable.com)
# Roda a cada 60 dias, gera/renova cert e atualiza o secret
# ==========================================================
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: acme-cert-renew
  namespace: mail
spec:
  schedule: "0 3 1 */2 *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            hardware-type: high-performance
          serviceAccountName: acme-cert-renew
          containers:
          - name: acme
            image: neilpang/acme.sh:latest
            command:
            - sh
            - -c
            - |
              export CF_Token="$CF_API_TOKEN"
              export CF_Zone_ID="$CF_ZONE_ID"

              # Registrar conta ACME (idempotente)
              acme.sh --register-account -m admin@acdgbrasil.com.br --server letsencrypt

              # Emitir/renovar cert via DNS-01 Cloudflare (CNAME delegation)
              acme.sh --issue \
                --dns dns_cf \
                --domain mail.acdgbrasil.com.br \
                --domain-alias _acme-challenge.mail.noticetable.com \
                --server letsencrypt \
                --force

              # Instalar cert nos arquivos temporários
              acme.sh --install-cert -d mail.acdgbrasil.com.br \
                --cert-file /certs/tls.crt \
                --key-file /certs/tls.key \
                --fullchain-file /certs/tls.crt

              # Atualizar o secret no K8s
              if [ -f /certs/tls.crt ] && [ -f /certs/tls.key ]; then
                cat <<EOKUBE | kubectl apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: stalwart-tls-cert
                namespace: mail
              type: kubernetes.io/tls
              data:
                tls.crt: $(base64 -w0 /certs/tls.crt)
                tls.key: $(base64 -w0 /certs/tls.key)
              EOKUBE

                # Restart Stalwart pra carregar o novo cert
                kubectl rollout restart deployment stalwart -n mail
                echo "Cert renewed and applied successfully"
              else
                echo "ERROR: cert files not found" && exit 1
              fi
            env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stalwart-cf-credentials
                  key: api-token
            - name: CF_ZONE_ID
              value: "0668fa9ca9426fa189bcf90b01dd8242"
            volumeMounts:
            - name: certs
              mountPath: /certs
          volumes:
          - name: certs
            emptyDir: {}
          restartPolicy: OnFailure
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: acme-cert-renew
  namespace: mail
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: acme-cert-renew
  namespace: mail
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: acme-cert-renew
  namespace: mail
subjects:
- kind: ServiceAccount
  name: acme-cert-renew
  namespace: mail
roleRef:
  kind: Role
  name: acme-cert-renew
  apiGroup: rbac.authorization.k8s.io

# ==========================================================
# BitwardenSecret — API key do Resend (relay SMTP)
# ==========================================================
---
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: resend-bitwardensecret
  namespace: mail
spec:
  organizationId: "d00e0ecf-235b-4168-8367-b35e00dbf84d"
  secretName: resend-credentials
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: "b376d1fe-0038-4540-a945-b40e012e7600"
      secretKeyName: api-key

# ==========================================================
# Deployment — Stalwart (pod único)
# ==========================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart
  namespace: mail
  labels:
    app: stalwart
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: stalwart
  template:
    metadata:
      labels:
        app: stalwart
    spec:
      nodeSelector:
        hardware-type: high-performance
      containers:
      - name: stalwart
        image: stalwartlabs/stalwart:v0.15.5
        ports:
        - containerPort: 25
          name: smtp
        - containerPort: 465
          name: smtps
        - containerPort: 587
          name: submission
        - containerPort: 143
          name: imap
        - containerPort: 993
          name: imaps
        - containerPort: 8080
          name: http
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stalwart-db-credentials
              key: password
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stalwart-admin-credentials
              key: admin-password
        - name: RESEND_SMTP_KEY
          valueFrom:
            secretKeyRef:
              name: resend-credentials
              key: api-key
        volumeMounts:
        - name: data
          mountPath: /opt/stalwart
        - name: config
          mountPath: /opt/stalwart/etc/config.toml
          subPath: config.toml
        - name: tls
          mountPath: /opt/stalwart/etc/tls
          readOnly: true
        - name: dkim
          mountPath: /opt/stalwart/etc/dkim
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: stalwart-config
      - name: data
        hostPath:
          path: /var/lib/stalwart
          type: DirectoryOrCreate
      - name: tls
        secret:
          secretName: stalwart-tls-cert
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
      - name: dkim
        secret:
          secretName: stalwart-dkim-key
          items:
          - key: dkim-private.pem
            path: dkim-private.pem

# --- Service: ClusterIP para Ingress HTTP ---
---
apiVersion: v1
kind: Service
metadata:
  name: stalwart
  namespace: mail
spec:
  selector:
    app: stalwart
  ports:
  - name: http
    port: 8080
    targetPort: 8080

# --- Service: NodePort para portas de e-mail (TCP) ---
# HAProxy na VPS encaminha TCP para estas NodePorts via Tailscale
---
apiVersion: v1
kind: Service
metadata:
  name: stalwart-mail
  namespace: mail
spec:
  type: NodePort
  selector:
    app: stalwart
  ports:
  - name: smtp
    port: 25
    targetPort: 25
    nodePort: 30208
    protocol: TCP
  - name: smtps
    port: 465
    targetPort: 465
    nodePort: 32286
    protocol: TCP
  - name: submission
    port: 587
    targetPort: 587
    nodePort: 31420
    protocol: TCP
  - name: imaps
    port: 993
    targetPort: 993
    nodePort: 32078
    protocol: TCP

# --- Ingress: Acesso web (admin + webmail) via Traefik ---
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stalwart
  namespace: mail
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - host: mail.acdgbrasil.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: stalwart
            port:
              number: 8080
