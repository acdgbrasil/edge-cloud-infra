# -----------------------------------------------------------
# Stalwart Mail Server — All-in-one (SMTP, IMAP, JMAP, Web)
# Substitui Mailu (7 pods) por 1 único pod.
# Domínio: acdgbrasil.com.br
# Hostname: mail.acdgbrasil.com.br
# Relay: Resend.com (porta 465, TLS implícito)
# -----------------------------------------------------------
#
# PRÉ-REQUISITOS (manuais, antes do deploy):
#
#   1. Criar o database no PostgreSQL:
#      kubectl exec -it postgres-0 -- psql -U postgres -c "CREATE DATABASE stalwart;"
#      kubectl exec -it postgres-0 -- psql -U postgres -c "CREATE USER stalwart WITH PASSWORD '<SENHA>';"
#      kubectl exec -it postgres-0 -- psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE stalwart TO stalwart;"
#      kubectl exec -it postgres-0 -- psql -U postgres -c "ALTER DATABASE stalwart OWNER TO stalwart;"
#
#   2. Criar secret com a senha do banco:
#      kubectl create secret generic stalwart-db-credentials -n mail \
#        --from-literal=password='<MESMA-SENHA>'
#
#   3. Criar secret com a API key do Resend:
#      (Reusar o resend-credentials que já existe via BitwardenSecret)
#
#   4. Criar secret com senha do admin:
#      kubectl create secret generic stalwart-admin-credentials -n mail \
#        --from-literal=admin-password='<SENHA-ADMIN>'
#
#   5. TLS: gerenciado automaticamente via ACME DNS-01 (Let's Encrypt + Cloudflare).
#      Requer: secret stalwart-cf-credentials com API token Cloudflare.
#      CNAME na Umbler: _acme-challenge.mail → _acme-challenge.mail.noticetable.com
#
#   6. Garantir diretório no Xeon:
#      sudo mkdir -p /var/lib/stalwart
#      sudo chmod 755 /var/lib/stalwart
#
# -----------------------------------------------------------

# ==========================================================
# ConfigMap — config.toml do Stalwart
# ==========================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-config
  namespace: mail
data:
  config.toml: |
    [server]
    hostname = "mail.acdgbrasil.com.br"
    max-connections = 1024
    allowed-ips = ["10.42.0.0/16", "10.43.0.0/16", "127.0.0.0/8"]

    # --- Listeners ---
    [server.listener."smtp"]
    bind = ["[::]:25"]
    protocol = "smtp"

    [server.listener."submissions"]
    bind = ["[::]:465"]
    protocol = "smtp"
    tls.implicit = true

    [server.listener."submission"]
    bind = ["[::]:587"]
    protocol = "smtp"

    [server.listener."imap"]
    bind = ["[::]:143"]
    protocol = "imap"

    [server.listener."imaps"]
    bind = ["[::]:993"]
    protocol = "imap"
    tls.implicit = true

    [server.listener."http"]
    bind = ["[::]:8080"]
    protocol = "http"

    # --- TLS (ACME Let's Encrypt via DNS-01 + Cloudflare) ---
    # Usa CNAME delegation: _acme-challenge.mail.acdgbrasil.com.br → _acme-challenge.mail.noticetable.com
    # Stalwart cria TXT records na Cloudflare (noticetable.com) via API
    [acme."letsencrypt"]
    directory = "https://acme-v02.api.letsencrypt.org/directory"
    challenge = "dns-01"
    domains = ["mail.acdgbrasil.com.br"]
    contact = ["mailto:admin@acdgbrasil.com.br"]
    default = true
    provider = "cloudflare"
    secret = "%{env:CF_API_TOKEN}%"

    # --- Storage (PostgreSQL) ---
    [store."postgresql"]
    type = "postgresql"
    host = "postgres-stalwart.mail.svc.cluster.local"
    port = 5432
    database = "stalwart"
    user = "stalwart"
    password = "%{env:DB_PASSWORD}%"
    timeout = "15s"

    [store."postgresql".tls]
    enable = false

    [store."postgresql".pool]
    max-connections = 10

    # --- Directory (user management via PostgreSQL) ---
    [directory."internal"]
    type = "internal"
    store = "postgresql"

    [storage]
    data = "postgresql"
    blob = "postgresql"
    fts = "postgresql"
    lookup = "postgresql"
    directory = "internal"

    # --- Admin fallback ---
    [authentication.fallback-admin]
    user = "admin"
    secret = "%{env:ADMIN_PASSWORD}%"

    # --- DKIM ---
    [signature."dkim"]
    algorithm = "rsa-sha256"
    domain = "acdgbrasil.com.br"
    selector = "default"
    private-key = "%{file:/opt/stalwart/etc/dkim/dkim-private.pem}%"
    headers = ["From", "To", "Date", "Subject", "Message-ID"]
    set = true

    # --- SMTP Relay via Resend (porta 25 outbound bloqueada pelo datacenter) ---
    [queue.outbound.next-hop]
    if = "true"
    then = "relay"

    [remote."relay"]
    address = "smtp.resend.com"
    port = 587
    protocol = "smtp"

    [remote."relay".tls]
    implicit = false
    starttls = true

    [remote."relay".auth]
    username = "resend"
    secret = "%{env:RESEND_SMTP_KEY}%"

# ==========================================================
# BitwardenSecret — API key do Resend (relay SMTP)
# ==========================================================
---
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: resend-bitwardensecret
  namespace: mail
spec:
  organizationId: "d00e0ecf-235b-4168-8367-b35e00dbf84d"
  secretName: resend-credentials
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: "b376d1fe-0038-4540-a945-b40e012e7600"
      secretKeyName: api-key

# ==========================================================
# Deployment — Stalwart (pod único)
# ==========================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart
  namespace: mail
  labels:
    app: stalwart
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: stalwart
  template:
    metadata:
      labels:
        app: stalwart
    spec:
      nodeSelector:
        hardware-type: high-performance
      containers:
      - name: stalwart
        image: stalwartlabs/stalwart:v0.15.5
        ports:
        - containerPort: 25
          name: smtp
        - containerPort: 465
          name: smtps
        - containerPort: 587
          name: submission
        - containerPort: 143
          name: imap
        - containerPort: 993
          name: imaps
        - containerPort: 8080
          name: http
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stalwart-db-credentials
              key: password
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stalwart-admin-credentials
              key: admin-password
        - name: RESEND_SMTP_KEY
          valueFrom:
            secretKeyRef:
              name: resend-credentials
              key: api-key
        - name: CF_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: stalwart-cf-credentials
              key: api-token
        volumeMounts:
        - name: data
          mountPath: /opt/stalwart
        - name: config
          mountPath: /opt/stalwart/etc/config.toml
          subPath: config.toml
        - name: dkim
          mountPath: /opt/stalwart/etc/dkim
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: stalwart-config
      - name: data
        hostPath:
          path: /var/lib/stalwart
          type: DirectoryOrCreate
      - name: dkim
        secret:
          secretName: stalwart-dkim-key
          items:
          - key: dkim-private.pem
            path: dkim-private.pem

# --- Service: ClusterIP para Ingress HTTP ---
---
apiVersion: v1
kind: Service
metadata:
  name: stalwart
  namespace: mail
spec:
  selector:
    app: stalwart
  ports:
  - name: http
    port: 8080
    targetPort: 8080

# --- Service: NodePort para portas de e-mail (TCP) ---
# HAProxy na VPS encaminha TCP para estas NodePorts via Tailscale
---
apiVersion: v1
kind: Service
metadata:
  name: stalwart-mail
  namespace: mail
spec:
  type: NodePort
  selector:
    app: stalwart
  ports:
  - name: smtp
    port: 25
    targetPort: 25
    nodePort: 30208
    protocol: TCP
  - name: smtps
    port: 465
    targetPort: 465
    nodePort: 32286
    protocol: TCP
  - name: submission
    port: 587
    targetPort: 587
    nodePort: 31420
    protocol: TCP
  - name: imaps
    port: 993
    targetPort: 993
    nodePort: 32078
    protocol: TCP

# --- Ingress: Acesso web (admin + webmail) via Traefik ---
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stalwart
  namespace: mail
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - host: mail.acdgbrasil.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: stalwart
            port:
              number: 8080
