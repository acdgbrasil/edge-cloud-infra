# FluxCD Kustomization para o servidor de e-mail (Mailu)
# Sincroniza manifests de ./mail para o namespace `mail`
# Sem targetNamespace — cada recurso declara seu próprio namespace
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mail
  namespace: flux-system
spec:
  interval: 5m
  path: ./mail
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: apps
