# -----------------------------------------------------------
# RBAC for GitHub Actions OIDC Keyless Authentication
#
# Allows GitHub Actions workflows from acdgbrasil org repos
# to query cluster state (pods, deployments, services, logs)
# for post-deploy health checks and observability.
#
# Prerequisites:
#   K3s API server must be configured with OIDC flags.
#   See docs/OIDC-GITHUB-ACTIONS.md for setup instructions.
# -----------------------------------------------------------

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: github-actions-readonly
  labels:
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/part-of: acdg-ci
rules:
  # Core: pods, services, endpoints, events
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "events", "namespaces"]
    verbs: ["get", "list"]
  # Core: pod logs for debugging
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Apps: deployments, statefulsets, replicasets
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list"]
  # Flux: kustomizations and helmreleases status
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories", "helmrepositories"]
    verbs: ["get", "list"]

---
# Bind to edge-cloud-infra repo (main branch) — smoke tests & observability
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-actions-infra-readonly
  labels:
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/part-of: acdg-ci
subjects:
  - kind: User
    name: "repo:acdgbrasil/edge-cloud-infra:ref:refs/heads/main"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: github-actions-readonly
  apiGroup: rbac.authorization.k8s.io

---
# Bind to all acdgbrasil repos (any ref) — read-only cluster status
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-actions-org-readonly
  labels:
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/part-of: acdg-ci
subjects:
  - kind: Group
    name: "acdgbrasil"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: github-actions-readonly
  apiGroup: rbac.authorization.k8s.io
