# -----------------------------------------------------------
# svc-social-care (HML) — Ambiente de Homologação
# Imagem: ghcr.io/acdgbrasil/svc-social-care (mesma de produção)
# Propósito: testes de integração end-to-end (frontend + CI)
# -----------------------------------------------------------

---
# 1. BitwardenSecret — Credenciais do PostgreSQL HML
# AÇÃO MANUAL: Criar secrets no Bitwarden Secret Manager (ambiente HML)
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: postgres-hml-bitwardensecret
spec:
  organizationId: "d00e0ecf-235b-4168-8367-b35e00dbf84d"
  secretName: postgres-hml-credentials
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: "c0ad6057-d8a5-4369-817b-b3f00057240f"
      secretKeyName: password

---
# 1b. BitwardenSecret — Credenciais de Introspection (Zitadel API app)
# AÇÃO MANUAL: Criar secret no Bitwarden com client_id e client_secret
#              da API app social-care-hml-tests e substituir os bwSecretIds.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: zitadel-introspect-hml-bitwardensecret
spec:
  organizationId: "d00e0ecf-235b-4168-8367-b35e00dbf84d"
  secretName: zitadel-introspect-hml-credentials
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: "38e16810-296c-469f-9109-b40a01759c1f"
      secretKeyName: client-id
    - bwSecretId: "69cdf9d5-113e-42b8-8d46-b40a0175b725"
      secretKeyName: client-secret

---
# 1c. BitwardenSecret — Allowlist de service accounts autorizados
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: service-accounts-hml-bitwardensecret
spec:
  organizationId: "d00e0ecf-235b-4168-8367-b35e00dbf84d"
  secretName: service-accounts-hml-credentials
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: "eef17504-4625-40c9-a9bd-b40a017bb563"
      secretKeyName: allowed-ids

---
# 2. StatefulSet — PostgreSQL HML (instância isolada)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-hml
spec:
  serviceName: "postgres-hml"
  replicas: 1
  selector:
    matchLabels:
      app: postgres-hml
  template:
    metadata:
      labels:
        app: postgres-hml
    spec:
      nodeSelector:
        hardware-type: high-performance
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: social_care_hml
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-hml-credentials
              key: password
        - name: POSTGRES_DB
          value: social_care_hml
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        volumeMounts:
        - name: postgres-hml-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-hml-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 2Gi

---
# 4. Service — PostgreSQL HML
apiVersion: v1
kind: Service
metadata:
  name: postgres-hml
spec:
  selector:
    app: postgres-hml
  ports:
  - port: 5432
    targetPort: 5432

---
# 5. Deployment — social-care HML
apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-care-hml
  labels:
    app: social-care-hml
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: social-care-hml
  template:
    metadata:
      labels:
        app: social-care-hml
    spec:
      imagePullSecrets:
      - name: ghcr-credentials
      nodeSelector:
        hardware-type: high-performance
      containers:
      - name: social-care
        image: ghcr.io/acdgbrasil/svc-social-care:v0.5.5
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: SERVER_HOST
          value: "0.0.0.0"
        - name: DB_HOST
          value: postgres-hml
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: social_care_hml
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-hml-credentials
              key: password
        - name: DB_NAME
          value: social_care_hml
        - name: VERBOSE_ERRORS
          value: "true"
        - name: JWKS_URL
          value: "https://auth.acdgbrasil.com.br/oauth/v2/keys"
        - name: ZITADEL_ISSUER
          value: "https://auth.acdgbrasil.com.br"
        - name: ZITADEL_INTROSPECT_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: zitadel-introspect-hml-credentials
              key: client-id
        - name: ZITADEL_INTROSPECT_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: zitadel-introspect-hml-credentials
              key: client-secret
        - name: ALLOWED_SERVICE_ACCOUNTS
          valueFrom:
            secretKeyRef:
              name: service-accounts-hml-credentials
              key: allowed-ids
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"

---
# 6. Service — social-care HML
apiVersion: v1
kind: Service
metadata:
  name: social-care-hml
spec:
  selector:
    app: social-care-hml
  ports:
  - port: 80
    targetPort: 3000

---
# 7. Ingress — social-care HML (Traefik)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: social-care-hml-ingress
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - host: social-care-hml.acdgbrasil.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: social-care-hml
            port:
              number: 80

---
# 8. CronJob — Reset semanal do banco HML (domingos 03:00 UTC)
# Remove todos os dados e deixa o banco limpo para testes.
# As migrations rodam automaticamente quando o serviço sobe.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: social-care-hml-db-reset
spec:
  schedule: "0 3 * * 0"
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            hardware-type: high-performance
          containers:
          - name: db-reset
            image: postgres:15
            command:
            - sh
            - -c
            - |
              PGPASSWORD="$DB_PASSWORD" psql -h postgres-hml -U social_care_hml -d postgres -c "
                SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'social_care_hml' AND pid <> pg_backend_pid();
                DROP DATABASE IF EXISTS social_care_hml;
                CREATE DATABASE social_care_hml OWNER social_care_hml;
              "
            env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-hml-credentials
                  key: password
          restartPolicy: OnFailure
