# -----------------------------------------------------------
# Conecta Raros — Web Frontend + BFF (HML / Staging)
#
# Two Deployments behind conecta-hml.acdgbrasil.com.br:
#   /api/*    → social-care-bff-hml (prefix stripped)
#   /auth/*   → social-care-bff-hml (no strip)
#   /health/* → social-care-bff-hml (no strip)
#   /*        → conecta-web-hml (nginx, Flutter WASM)
#
# Uses staging secrets from Bitwarden Secret Manager.
# -----------------------------------------------------------

---
# 1. BitwardenSecret — BFF OIDC credentials (staging)
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: bff-oidc-credentials-hml-bitwardensecret
spec:
  organizationId: "d00e0ecf-235b-4168-8367-b35e00dbf84d"
  secretName: bff-oidc-credentials-hml
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: "0a82890b-0fb4-49d6-bbc6-b42400d47c5e"
      secretKeyName: client-id
    - bwSecretId: "4189ce3a-c21f-406e-bf8a-b42400d48aed"
      secretKeyName: client-secret

---
# 2. BitwardenSecret — BFF session secret (staging)
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: bff-session-secret-hml-bitwardensecret
spec:
  organizationId: "d00e0ecf-235b-4168-8367-b35e00dbf84d"
  secretName: bff-session-secret-hml
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: "95c92038-0fd5-4c7d-ba7a-b42400d49e45"
      secretKeyName: secret

---
# 3. Deployment — conecta-web-hml (Flutter WASM + nginx)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: conecta-web-hml
  labels:
    app: conecta-web-hml
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: conecta-web-hml
  template:
    metadata:
      labels:
        app: conecta-web-hml
    spec:
      imagePullSecrets:
      - name: ghcr-credentials
      nodeSelector:
        hardware-type: high-performance
      containers:
      - name: conecta-web-hml
        image: ghcr.io/acdgbrasil/conecta-web:sha-1933913
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 30
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "100m"

---
# 4. Service — conecta-web-hml
apiVersion: v1
kind: Service
metadata:
  name: conecta-web-hml
spec:
  selector:
    app: conecta-web-hml
  ports:
  - port: 80
    targetPort: 80

---
# 5. Deployment — social-care-bff-hml (Dart AOT + shelf)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-care-bff-hml
  labels:
    app: social-care-bff-hml
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: social-care-bff-hml
  template:
    metadata:
      labels:
        app: social-care-bff-hml
    spec:
      imagePullSecrets:
      - name: ghcr-credentials
      nodeSelector:
        hardware-type: high-performance
      containers:
      - name: social-care-bff-hml
        image: ghcr.io/acdgbrasil/social-care-bff:v0.3.4
        ports:
        - containerPort: 8081
        env:
        - name: PORT
          value: "8081"
        - name: HOST
          value: "0.0.0.0"
        - name: API_BASE_URL
          value: "http://social-care-hml.default.svc.cluster.local"
        - name: PEOPLE_CONTEXT_BASE_URL
          value: "http://people-context-hml.default.svc.cluster.local"
        - name: OIDC_ISSUER
          value: "https://auth.acdgbrasil.com.br"
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: bff-oidc-credentials-hml
              key: client-id
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: bff-oidc-credentials-hml
              key: client-secret
        - name: OIDC_REDIRECT_URI
          value: "https://conecta-hml.acdgbrasil.com.br/auth/callback"
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: bff-session-secret-hml
              key: secret
        - name: SESSION_TTL_MINUTES
          value: "60"
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"

---
# 6. Service — social-care-bff-hml
apiVersion: v1
kind: Service
metadata:
  name: social-care-bff-hml
spec:
  selector:
    app: social-care-bff-hml
  ports:
  - port: 80
    targetPort: 8081

---
# 7. Middleware — strip /api prefix (HML)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix-hml
spec:
  stripPrefix:
    prefixes:
      - /api

---
# 8. IngressRoute — conecta-hml.acdgbrasil.com.br
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: conecta-web-hml-ingress
spec:
  entryPoints:
    - web
  routes:
    # BFF — /api/* (strip prefix)
    - match: Host(`conecta-hml.acdgbrasil.com.br`) && PathPrefix(`/api/`)
      kind: Rule
      middlewares:
        - name: strip-api-prefix-hml
      services:
        - name: social-care-bff-hml
          port: 80

    # BFF — /auth/* (no strip)
    - match: Host(`conecta-hml.acdgbrasil.com.br`) && PathPrefix(`/auth/`)
      kind: Rule
      services:
        - name: social-care-bff-hml
          port: 80

    # BFF — /health/* (no strip)
    - match: Host(`conecta-hml.acdgbrasil.com.br`) && PathPrefix(`/health/`)
      kind: Rule
      services:
        - name: social-care-bff-hml
          port: 80

    # Frontend — everything else
    - match: Host(`conecta-hml.acdgbrasil.com.br`)
      kind: Rule
      services:
        - name: conecta-web-hml
          port: 80
