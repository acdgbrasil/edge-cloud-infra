# -----------------------------------------------------------
# people-context — Central Identity Registry (ACDG)
# Image: ghcr.io/acdgbrasil/people-context
# -----------------------------------------------------------

---
# 1. PostgreSQL (dedicated database-per-service)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-people
  labels:
    app: postgres-people
spec:
  serviceName: postgres-people
  replicas: 1
  selector:
    matchLabels:
      app: postgres-people
  template:
    metadata:
      labels:
        app: postgres-people
    spec:
      nodeSelector:
        hardware-type: high-performance
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-people-credentials
              key: password
        - name: POSTGRES_DB
          value: people
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-people
spec:
  selector:
    app: postgres-people
  ports:
  - port: 5432
    targetPort: 5432

---
# 2. BitwardenSecret for PostgreSQL credentials
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: postgres-people-bitwardensecret
spec:
  organizationId: "d00e0ecf-235b-4168-8367-b35e00dbf84d"
  secretName: postgres-people-credentials
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: "61c521b0-c547-4921-ac03-b4240109e80b"
      secretKeyName: password

---
# 3. Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: people-context
  labels:
    app: people-context
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: people-context
  template:
    metadata:
      labels:
        app: people-context
    spec:
      imagePullSecrets:
      - name: ghcr-credentials
      nodeSelector:
        hardware-type: high-performance
      initContainers:
      - name: wait-for-deps
        image: busybox:1.36
        command: ['sh', '-c',
          'until nc -z postgres-people 5432; do
             echo "Waiting for postgres-people...";
             sleep 5;
           done']
      containers:
      - name: people-context
        image: ghcr.io/acdgbrasil/people-context:v0.2.0
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: DB_HOST
          value: postgres-people
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-people-credentials
              key: password
        - name: DB_NAME
          value: people
        - name: JWKS_URL
          value: "https://auth.acdgbrasil.com.br/oauth/v2/keys"
        - name: ZITADEL_ISSUER
          value: "https://auth.acdgbrasil.com.br"
        - name: NATS_URL
          value: "nats://nats.default.svc.cluster.local:4222"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 30
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"

---
# 4. Service
apiVersion: v1
kind: Service
metadata:
  name: people-context
spec:
  selector:
    app: people-context
  ports:
  - port: 80
    targetPort: 3000

---
# 5. Ingress (Traefik)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: people-context-ingress
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - host: people.acdgbrasil.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: people-context
            port:
              number: 80
