# -----------------------------------------------------------
# NATS JetStream — Message Broker
# Streams: SOCIAL_CARE_EVENTS (social-care.events.>)
# -----------------------------------------------------------

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
spec:
  selector:
    matchLabels:
      app: nats
  serviceName: "nats"
  replicas: 1
  template:
    metadata:
      labels:
        app: nats
    spec:
      nodeSelector:
        hardware-type: high-performance
      containers:
      - name: nats
        image: nats:2.10-alpine
        args: ["-js", "-sd", "/data"]
        ports:
        - containerPort: 4222
          name: client
        - containerPort: 8222
          name: monitor
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        volumeMounts:
        - name: nats-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: nats-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
spec:
  selector:
    app: nats
  ports:
  - name: client
    port: 4222
    targetPort: 4222
  - name: monitor
    port: 8222
    targetPort: 8222

---
# Job para criar o stream JetStream SOCIAL_CARE_EVENTS.
# Idempotente: se o stream já existe, o comando falha silenciosamente.
# Executar manualmente: kubectl create job --from=job/nats-stream-setup nats-stream-setup-run
apiVersion: batch/v1
kind: Job
metadata:
  name: nats-stream-setup
spec:
  backoffLimit: 3
  template:
    spec:
      nodeSelector:
        hardware-type: high-performance
      containers:
      - name: nats-cli
        image: natsio/nats-box:0.14.5
        command:
        - sh
        - -c
        - |
          nats -s nats://nats:4222 stream add SOCIAL_CARE_EVENTS \
            --subjects="social-care.events.>" \
            --retention=limits \
            --max-age=720h \
            --storage=file \
            --replicas=1 \
            --discard=old \
            --max-msgs=-1 \
            --max-bytes=-1 \
            --max-msg-size=-1 \
            --dupe-window=2m \
            --no-allow-rollup \
            --deny-delete \
            --deny-purge \
            --defaults 2>/dev/null || echo "Stream already exists or created successfully"
      restartPolicy: Never
