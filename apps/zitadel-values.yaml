# -----------------------------------------------------------
# Zitadel — Identity Provider (OIDC/OAuth)
# Helm chart: zitadel/zitadel
# Deploy: helm install zitadel zitadel/zitadel -f apps/zitadel-values.yaml
# -----------------------------------------------------------

replicaCount: 1

zitadel:
  masterkeySecretName: zitadel-masterkey
  configSecretName: zitadel-db-credentials
  configmapConfig:
    ExternalDomain: "auth.acdgbrasil.com.br"
    ExternalSecure: true
    ExternalPort: 443
    TLS:
      Enabled: false
    Database:
      Postgres:
        Host: "postgres"
        Port: 5432
        Database: "zitadel"
        User:
          Username: "zitadel"
          SSL:
            Mode: "disable"
        Admin:
          Username: "postgres"
          SSL:
            Mode: "disable"
    FirstInstance:
      Org:
        Human:
          UserName: "admin"
          FirstName: "ACDG"
          LastName: "Admin"
          Email: "admin@acdgbrasil.com.br"
          Password: "AcdgAdmin2024!"
          PasswordChangeRequired: true

ingress:
  enabled: true
  className: traefik
  annotations:
    kubernetes.io/ingress.class: traefik
  hosts:
    - host: auth.acdgbrasil.com.br
      paths:
        - path: /
          pathType: Prefix
  tls: []

login:
  ingress:
    enabled: true
    className: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
    hosts:
      - host: auth.acdgbrasil.com.br
        paths:
          - path: /ui/v2/login
            pathType: Prefix
    tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector:
  hardware-type: high-performance
